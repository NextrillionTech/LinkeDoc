<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Outer circle -->
    <circle cx="65" cy="65" r="60" fill="none" stroke="#0d9488" stroke-width="4" />
    
    <!-- Three human nodes (top, left, right) -->
    <!-- Top person -->
    <circle cx="65" cy="25" r="6" fill="#0d9488" />
    <path d="M 65 31 Q 65 50 65 65" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" />
    
    <!-- Left person -->
    <circle cx="25" cy="65" r="6" fill="#0d9488" />
    <path d="M 31 65 Q 50 65 65 65" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" />
    
    <!-- Right person -->
    <circle cx="105" cy="65" r="6" fill="#0d9488" />
    <path d="M 99 65 Q 80 65 65 65" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" />
    
    <!-- Cross structure connecting nodes -->
    <path d="M 65 40 C 50 40 40 50 40 65 C 40 80 50 90 65 90 C 80 90 90 80 90 65 C 90 50 80 40 65 40 Z" fill="none" stroke="#0d9488" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Stethoscope details at the bottom branch -->
    <!-- Stethoscope chestpiece (left bottom loop) -->
    <circle cx="45" cy="95" r="8" fill="none" stroke="#0d9488" stroke-width="4" />
    <circle cx="45" cy="95" r="3" fill="#0d9488" />
    
    <!-- Stethoscope binaural/tubing (right bottom loop) -->
    <path d="M 65 65 C 65 90 60 115 75 115 C 90 115 85 95 85 90" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" />
    <path d="M 72 105 A 12 12 0 0 0 88 105" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" />
  </g>
  
  <!-- Logo Typography -->
  <text x="160" y="75" font-family="'Outfit', 'Figtree', sans-serif" font-weight="800" font-size="52" fill="#0f172a">Linke</text>
  <!-- Highlighted Doc box -->
  <rect x="288" y="32" width="102" height="56" rx="8" fill="#0d9488" />
  <text x="298" y="75" font-family="'Outfit', 'Figtree', sans-serif" font-weight="800" font-size="52" fill="#ffffff">Doc</text>
  
  <!-- Subtitle -->
  <text x="160" y="105" font-family="'Noto Sans', sans-serif" font-weight="500" font-size="16" fill="#475569" letter-spacing="0.5">Transforming The Medical Community</text>
</svg>
